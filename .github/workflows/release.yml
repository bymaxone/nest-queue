name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Only publish from a semver tag — a manual workflow_dispatch on a branch must never publish.
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify before publish
        run: pnpm prepublishOnly

      - name: Mutation gate (break 95)
        run: NODE_OPTIONS=--max-old-space-size=4096 pnpm mutation

      - name: Publish with provenance (OIDC)
        run: pnpm publish --provenance --no-git-checks

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          awk -v version="$VERSION" \
            'index($0, "## [" version "]") == 1 {found=1; next} /^## \[/{if(found) exit} found{print}' \
            CHANGELOG.md > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: actions/create-release@0cb9c9b65d5d1901c1f53e5e66eaf4afd303e70e # v1.1.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
